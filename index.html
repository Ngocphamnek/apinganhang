    <meta name="description" content="Professional CoreBank Panel PRO" />
    <script>
      (function () {
        window.addEventListener('error', function (e) {
          if (
            e.message === 'ResizeObserver loop completed with undelivered notifications.' ||
            e.message === 'ResizeObserver loop limit exceeded'
          ) {
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        }, true);
        var OrigRO = window.ResizeObserver;
        window.ResizeObserver = function (cb) {
          return new OrigRO(function (entries, observer) {
            window.requestAnimationFrame(function () {
              try { cb(entries, observer); } catch (_) {}
            });
          });
        };
        window.ResizeObserver.prototype = OrigRO.prototype;
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
